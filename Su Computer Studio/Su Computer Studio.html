<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Su.Computer Studio | 線上報價系統</title>
    <link rel="icon" href="images/Su.ico" type="image/x-icon">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://www.gstatic.com">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@300;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js" defer></script>

    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-red: #ff3131;
            --neon-green: #00ff41;
            --neon-yellow: #facc15;
            --bg-deep: #06090f;
            --glass-bg: rgba(10, 15, 25, 0.95);
        }

        body {
            background: var(--bg-deep);
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            color: #e2e8f0;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 1.1rem;
            position: relative;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            overscroll-behavior: none;
        }

        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 3px 100%;
            z-index: 1000;
            pointer-events: none;
            opacity: 0.15;
        }

        .tech-font { font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }
        .mono-font { font-family: 'JetBrains Mono', monospace; }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
        }

        .quote-row { transition: all 0.3s ease; }
        .quote-row:nth-child(odd) { 
            background: linear-gradient(90deg, rgba(6, 14, 25, 0.95) 0%, rgba(0, 243, 255, 0.02) 100%);
            border-left: 3px solid rgba(0, 243, 255, 0.15); 
        }
        .quote-row:nth-child(even) { 
            background: linear-gradient(90deg, rgba(13, 22, 35, 0.95) 0%, rgba(16, 185, 129, 0.02) 100%);
            border-left: 3px solid rgba(16, 185, 129, 0.15); 
        }
        .quote-row:hover { background: rgba(0, 243, 255, 0.05); }

        .admin-row { transition: all 0.3s ease; }
        .admin-row:hover { filter: brightness(1.3); }

        .admin-label {
            color: var(--neon-cyan);
            font-size: 0.9rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            display: block;
            letter-spacing: 0.1em;
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.5);
        }

        .price-sale { color: var(--neon-red); text-shadow: 0 0 8px var(--neon-red); font-weight: 900; }
        .total-glow { text-shadow: 0 0 20px rgba(16, 185, 129, 0.8); }

        input, select {
            background: rgba(0, 0, 0, 0.6) !important;
            border: 1px solid rgba(0, 243, 255, 0.3) !important;
            color: #fff !important;
            outline: none !important;
            font-size: 16px !important;
        }
        input:focus:not(:disabled), select:focus:not(:disabled) { 
            border-color: var(--neon-cyan) !important;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3); 
        }
        #adminSearchInput:focus {
            border-color: transparent !important;
            box-shadow: none !important;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .input-border-cyan { border-left: 4px solid var(--neon-cyan) !important; }
        .input-border-green { border-left: 4px solid var(--neon-green) !important; }
        .input-border-yellow { border-left: 4px solid var(--neon-yellow) !important; }
        .input-border-red { border-left: 4px solid var(--neon-red) !important; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-corner { background: transparent; }
    </style>
</head>
<body>

<div id="loginModal" class="fixed inset-0 bg-black/95 z-[9999] hidden items-center justify-center backdrop-blur-md p-4">
    <div class="glass-card p-8 md:p-12 rounded-3xl w-full max-w-md border-cyan-500/50">
        <h2 class="tech-font text-2xl md:text-3xl text-cyan-400 mb-8 md:mb-10 text-center tracking-[0.2em]">管理者權限驗證</h2>
        <div class="space-y-6">
            <div>
                <label class="admin-label">管理者帳號</label>
                <input type="text" id="loginId" class="w-full p-4 rounded-xl tech-font" placeholder="UID...">
            </div>
            <div>
                <label class="admin-label">安全密碼</label>
                <input type="password" id="loginPass" class="w-full p-4 rounded-xl tech-font" placeholder="••••••••" onkeydown="if(event.key==='Enter') attemptLogin()">
            </div>
            <div class="flex flex-col sm:flex-row gap-4 pt-6">
                <button onclick="closeLogin()" class="w-full sm:flex-1 py-4 rounded-xl border border-gray-700 text-gray-500 hover:text-white transition-all tech-font">取消</button>
                <button onclick="attemptLogin()" class="w-full sm:flex-1 py-4 rounded-xl bg-cyan-600 text-black font-black hover:bg-cyan-400 transition-all tech-font shadow-[0_0_20px_rgba(8,145,178,0.4)]">進入系統</button>
            </div>
        </div>
    </div>
</div>

<div id="quoteAuthModal" class="fixed inset-0 bg-black/95 z-[9999] hidden items-center justify-center backdrop-blur-md p-4">
    <div class="glass-card p-8 md:p-10 rounded-3xl w-full max-w-sm border-purple-500/50 shadow-[0_0_30px_rgba(147,51,234,0.3)]">
        <h2 class="tech-font text-xl md:text-2xl text-purple-400 mb-6 text-center tracking-[0.2em] font-black">報價授權驗證</h2>
        <p class="text-xs text-center text-gray-400 mb-6 font-bold tracking-widest">扣除硬體庫存並產生紀錄，請輸入核准密碼</p>
        <div class="space-y-6">
            <input type="password" id="quotePassInput" class="w-full p-4 rounded-xl tech-font text-center focus:border-purple-400 focus:shadow-[0_0_10px_rgba(147,51,234,0.3)]" placeholder="授權密碼..." onkeydown="if(event.key==='Enter') verifyQuotePassword()">
            <div class="flex flex-row gap-4 pt-2">
                <button onclick="document.getElementById('quoteAuthModal').style.display='none'" class="flex-1 py-3 border border-gray-700 rounded-xl text-gray-400 hover:text-white transition-colors tech-font">取消</button>
                <button onclick="verifyQuotePassword()" class="flex-1 py-3 bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-black rounded-xl shadow-[0_0_15px_rgba(147,51,234,0.4)] hover:shadow-[0_0_25px_rgba(147,51,234,0.7)] transition-all tech-font">確認送出</button>
            </div>
        </div>
    </div>
</div>

<div id="clearHistoryModal" class="fixed inset-0 bg-black/95 z-[9999] hidden items-center justify-center backdrop-blur-md p-4">
    <div class="glass-card p-8 md:p-10 rounded-3xl w-full max-w-sm border-red-500/50 shadow-[0_0_30px_rgba(239,68,68,0.3)]">
        <h2 class="tech-font text-xl md:text-2xl text-red-400 mb-6 text-center tracking-[0.2em] font-black">清除紀錄驗證</h2>
        <p class="text-xs text-center text-gray-400 mb-6 font-bold tracking-widest">將永久刪除所有歷史紀錄，請輸入核准密碼</p>
        <div class="space-y-6">
            <input type="password" id="clearHistoryPassInput" class="w-full p-4 rounded-xl tech-font text-center focus:border-red-400 focus:shadow-[0_0_10px_rgba(239,68,68,0.3)]" placeholder="授權密碼..." onkeydown="if(event.key==='Enter') verifyClearHistoryPassword()">
            <div class="flex flex-row gap-4 pt-2">
                <button onclick="document.getElementById('clearHistoryModal').style.display='none'" class="flex-1 py-3 border border-gray-700 rounded-xl text-gray-400 hover:text-white transition-colors tech-font">取消</button>
                <button onclick="verifyClearHistoryPassword()" class="flex-1 py-3 bg-gradient-to-r from-red-600 to-rose-600 text-white font-black rounded-xl shadow-[0_0_15px_rgba(239,68,68,0.4)] hover:shadow-[0_0_25px_rgba(239,68,68,0.7)] transition-all tech-font">確認清除</button>
            </div>
        </div>
    </div>
</div>

<div id="main-scroll-container" class="absolute inset-0 w-full h-full overflow-y-auto overflow-x-hidden pb-[280px] md:pb-48 custom-scrollbar z-10 scroll-smooth">
    <div class="container mx-auto px-4 py-8 md:py-10">
        
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-10 md:mb-16 gap-6">
            <div class="w-full lg:w-auto">
                <h1 class="text-4xl sm:text-5xl md:text-7xl font-black tech-font tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-white via-cyan-400 to-blue-600 leading-tight">
                    基隆 Su - <br class="md:hidden"><span class="italic text-cyan-500 text-3xl sm:text-4xl md:text-7xl">Computer Studio</span>
                </h1>
                <p class="mono-font text-cyan-500/60 text-[10px] md:text-xs mt-3 tracking-[0.3em] md:tracking-[0.5em] uppercase font-bold">Su Computer Studio 線上報價系統 // Ver 6.5.0</p>
            </div>
            
            <div class="flex flex-col items-end gap-3 w-full lg:w-auto">
                <button id="adminToggleBtn" onclick="toggleAdminState()" class="group relative px-8 py-3 md:px-12 md:py-5 bg-transparent overflow-hidden w-full lg:w-auto border border-cyan-500/50">
                    <div class="absolute inset-0 skew-x-12 group-hover:bg-cyan-500 transition-all duration-300"></div>
                    <span id="btnText" class="relative z-10 tech-font font-bold text-lg md:text-xl text-cyan-400 group-hover:text-black transition-colors">Su.管理員 登入</span>
                </button>
                
                <button id="headerSubmitBtn" onclick="submitQuotation()" class="h-9 md:h-10 px-6 rounded-lg bg-cyan-900/40 hover:bg-cyan-700/50 text-cyan-300 hover:text-white font-bold tech-font text-xs md:text-sm border border-cyan-500/50 hover:border-cyan-400 shadow-[0_0_10px_rgba(0,243,255,0.2)] hover:shadow-[0_0_20px_rgba(0,243,255,0.4)] transition-all flex items-center justify-center gap-2 whitespace-nowrap w-full lg:w-auto mt-2 tracking-widest backdrop-blur-md">
                    <i class="fas fa-paper-plane text-xs"></i> <span>確認送出報價</span>
                </button>
            </div>
        </header>

        <div id="adminPanel" class="hidden glass-card rounded-2xl p-4 md:p-8 mb-12 border-yellow-500/30">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 md:mb-8 border-l-4 border-yellow-500 pl-4 relative">
                <div class="flex items-center gap-4 w-full md:w-auto">
                    <h3 class="text-yellow-400 font-bold text-xl md:text-2xl tech-font tracking-widest">Su.後臺資料庫管理</h3>
                    <div class="hidden md:block h-[1px] w-32 bg-gradient-to-r from-yellow-500/50 to-transparent"></div>
                </div>
                
                <div class="flex flex-wrap gap-2 w-full md:w-auto mt-2 md:mt-0 z-10">
                    <button onclick="exportDBToExcel()" class="bg-emerald-600/80 hover:bg-emerald-500 text-white px-4 py-2 rounded font-bold text-xs transition-all shadow-[0_0_10px_rgba(16,185,129,0.3)] border border-emerald-400/30 flex-1 md:flex-none flex justify-center items-center gap-2"><i class="fas fa-file-export"></i> 匯出資料庫</button>
                    <button onclick="document.getElementById('importDBInput').click()" class="bg-purple-600/80 hover:bg-purple-500 text-white px-4 py-2 rounded font-bold text-xs transition-all shadow-[0_0_10px_rgba(147,51,234,0.3)] border border-purple-400/30 flex-1 md:flex-none flex justify-center items-center gap-2"><i class="fas fa-file-import"></i> 匯入還原</button>
                    <input type="file" id="importDBInput" class="hidden" accept=".xlsx" onchange="importDBFromExcel(event)">
                </div>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-[1fr_400px] gap-8 md:gap-10">
                <div class="space-y-4 w-full overflow-hidden">
                    <label class="admin-label"><i class="fas fa-layer-group mr-2"></i>資料庫清單與管理</label>
                    
                    <div class="bg-black/40 p-3 mb-2 rounded-xl border border-white/10 flex items-center gap-3">
                        <i class="fas fa-search text-cyan-500 pl-2"></i>
                        <input type="text" id="adminSearchInput" oninput="renderAdminItemList()" class="w-full bg-transparent border-none text-white placeholder-gray-500 text-sm focus:outline-none focus:border-transparent focus:ring-0" placeholder="快速搜尋商品名稱或分類...">
                    </div>

                    <div class="bg-black/30 p-4 rounded-xl border border-white/5">
                        <div class="flex flex-wrap gap-2 mb-4" id="catTagContainer"></div>
                        <div class="flex flex-col sm:flex-row gap-2">
                            <input type="text" id="newCatName" class="p-3 rounded-lg flex-1" placeholder="新分類名稱...">
                            <button onclick="addCategory()" class="bg-yellow-600 hover:bg-yellow-500 text-black px-6 py-3 sm:py-0 rounded-lg font-bold transition-all">新增分類</button>
                        </div>
                    </div>
                
                    <div class="w-full pb-2 mt-4">
                        <div class="hidden md:grid grid-cols-[100px_1fr_100px_80px_80px_100px_40px] gap-3 px-4 py-3 text-xs font-bold text-cyan-500 uppercase tracking-widest bg-cyan-950/20 rounded-t-xl items-center border border-cyan-500/20 border-b-0">
                            <div class="text-center">分類</div>
                            <div>名稱規格</div>
                            <div class="text-center">定價</div>
                            <div class="text-center">折扣(%)</div>
                            <div class="text-center">庫存</div>
                            <div class="text-center">更新日期</div>
                            <div></div>
                        </div>
                        <div id="adminItemEditList" class="flex flex-col gap-4 md:gap-1 max-h-[700px] overflow-y-auto pr-1 md:pr-2 border border-white/5 md:border-t-0 rounded-xl md:rounded-t-none pb-4 md:mt-0 p-2 md:p-2 bg-black/20 custom-scrollbar"></div>
                    </div>
                </div>

                <div class="space-y-4 md:space-y-6">
                    <label class="admin-label"><i class="fas fa-plus-square mr-2"></i>新增商品</label>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-4 bg-black/40 p-5 md:p-6 rounded-2xl border border-white/10 shadow-2xl">
                        <div class="col-span-1 sm:col-span-2 lg:col-span-1">
                            <label class="text-[10px] text-gray-500 ml-1">選擇分類</label>
                            <select id="newCat" class="w-full p-4 rounded-xl"></select>
                        </div>
                        <div class="col-span-1 sm:col-span-2 lg:col-span-1">
                            <label class="text-[10px] text-gray-500 ml-1">硬體名稱</label>
                            <input type="text" id="newName" class="w-full p-4 rounded-xl input-border-cyan" placeholder="例如: Intel i9-14900K">
                        </div>
                        <div class="col-span-1 sm:col-span-1 lg:col-span-1">
                            <label class="text-[10px] text-gray-500 ml-1">零售價格</label>
                            <input type="number" id="newPrice" class="w-full p-4 rounded-xl input-border-green" placeholder="定價">
                        </div>
                        <div class="col-span-1 sm:col-span-1 lg:col-span-1">
                            <label class="text-[10px] text-gray-500 ml-1">折扣幅度 (0%~100%)</label>
                            <input type="number" id="itemDiscount" class="w-full p-4 rounded-xl text-yellow-500 input-border-yellow" value="0" min="0" max="100">
                        </div>
                        <div class="col-span-1 sm:col-span-2 lg:col-span-1">
                            <label class="text-[10px] text-gray-500 ml-1">初始庫存量</label>
                            <input type="number" id="newStock" class="w-full p-4 rounded-xl input-border-red" placeholder="入庫數量" min="0">
                        </div>
                        <button onclick="addItem()" class="col-span-1 sm:col-span-2 lg:col-span-1 bg-cyan-600 hover:bg-cyan-400 text-black font-black py-4 rounded-xl transition-all tech-font mt-2 shadow-lg">商品新增確認</button>
                    </div>
                </div>
            </div>

            <div class="mt-8 bg-black/40 border border-cyan-900/40 rounded-xl overflow-hidden shadow-2xl">
                <div class="flex flex-wrap justify-between items-center border-b border-cyan-900/40 bg-black/50">
                    <button onclick="toggleHistoryUI()" class="flex-1 flex items-center p-4 text-cyan-400 hover:bg-cyan-900/30 transition-colors font-bold tech-font tracking-widest text-left min-w-[200px]">
                        <i class="fas fa-history mr-3 text-lg"></i>系統操作與歷史報價紀錄
                        <i id="historyToggleIcon" class="fas fa-chevron-down ml-4"></i>
                    </button>
                    <div class="flex items-center gap-2 p-2 sm:p-0 sm:mr-4">
                        <button onclick="document.getElementById('clearHistoryModal').style.display='flex'; document.getElementById('clearHistoryPassInput').value=''; document.getElementById('clearHistoryPassInput').focus();" class="px-3 py-1.5 md:px-4 md:py-2 bg-red-600/50 hover:bg-red-500 text-white text-[10px] md:text-xs rounded border border-red-400/50 transition-all font-bold tech-font tracking-wider flex items-center gap-2">
                            <i class="fas fa-trash-alt"></i> <span class="hidden sm:inline">清空</span>
                        </button>
                        <button onclick="exportHistoryToTxt()" class="px-3 py-1.5 md:px-4 md:py-2 bg-blue-600/50 hover:bg-blue-500 text-white text-[10px] md:text-xs rounded border border-blue-400/50 transition-all font-bold tech-font tracking-wider flex items-center gap-2">
                            <i class="fas fa-download"></i> <span class="hidden sm:inline">匯出紀錄 TXT</span><span class="sm:hidden">匯出</span>
                        </button>
                    </div>
                </div>
                <div id="historyContent" class="hidden p-4 md:p-6 bg-black/60 max-h-[400px] overflow-y-auto custom-scrollbar relative">
                    </div>
            </div>
        </div>

        <div id="userDisplay" class="glass-card rounded-3xl overflow-hidden w-full relative z-20">
            <table class="w-full text-left block md:table md:table-fixed md:min-w-[1100px]">
                <thead class="hidden md:table-header-group">
                    <tr class="bg-cyan-950/60 text-cyan-400 uppercase text-xs tracking-[0.3em] tech-font">
                        <th class="p-8 w-[15%] border-b border-cyan-900/50">硬體項目</th>
                        <th class="p-8 w-[35%] border-b border-cyan-900/50">選擇組件型號</th>
                        <th class="p-8 w-[15%] border-b border-cyan-900/50 text-left">單價</th>
                        <th class="p-8 w-[15%] border-b border-cyan-900/50 text-left">數量</th>
                        <th class="p-8 w-[20%] border-b border-cyan-900/50 text-left">小計</th>
                    </tr>
                </thead>
                <tbody id="quoteTable" class="block md:table-row-group divide-y md:divide-white/5 divide-transparent"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="bottomBar" class="absolute bottom-0 left-0 right-0 w-full glass-card border-t border-cyan-500/30 pt-4 md:pt-6 px-4 md:px-12 z-[5000]" style="padding-bottom: calc(1rem + env(safe-area-inset-bottom));">
    <div class="w-full flex flex-col md:flex-row justify-between items-start md:items-center gap-4 md:gap-6">
        <div class="flex items-center gap-4 md:gap-10">
            <div class="h-10 md:h-12 w-[3px] bg-cyan-500 shadow-[0_0_15px_#00f3ff]"></div>
            <div class="mono-font text-[10px] md:text-xs leading-relaxed text-gray-400">
                <span class="text-cyan-500 opacity-60">當前授權狀態:</span> 
                <span id="authStatus" class="text-cyan-400 font-bold">使用者權限</span><br>
                <span class="text-cyan-500 opacity-60">最新報價更新日:</span> <span id="updateDate" class="text-white/80"></span>
            </div>
        </div>
        
        <div id="bottomActions" class="flex flex-row items-center justify-between md:justify-end gap-4 md:gap-6 w-full md:w-auto md:flex-1 border-t border-cyan-900/50 md:border-t-0 pt-4 md:pt-0 mt-2 md:mt-0">
            <div class="text-left md:text-right">
                <div class="text-[10px] md:text-xs uppercase tracking-[0.4em] md:tracking-[0.6em] text-cyan-500/50 font-black mb-1 md:mb-2">估價 總金額</div>
                <div class="text-3xl sm:text-4xl md:text-6xl font-black tech-font text-emerald-400 total-glow flex items-baseline">
                    <span class="text-base md:text-xl mr-2 md:mr-3 font-light text-emerald-600">NT$</span>
                    <span id="grandTotal">0</span>
                </div>
            </div>
            
            <div class="flex gap-2 sm:gap-4">
                <button onclick="exportToExcel()" class="h-8 md:h-10 px-4 md:px-5 rounded-lg bg-slate-800/60 hover:bg-slate-700/80 text-cyan-400 hover:text-white font-bold tech-font text-[10px] md:text-xs border border-cyan-600/40 hover:border-cyan-400 shadow-[0_0_8px_rgba(0,243,255,0.1)] transition-all flex items-center gap-2 whitespace-nowrap backdrop-blur-md">
                    <i class="fas fa-file-excel text-base text-emerald-500"></i> <span id="exportBtnText" class="hidden sm:inline">匯出正式報價單</span><span class="sm:hidden">匯出</span>
                </button>
            </div>
        </div>
    </div>
</div>

<button id="scrollTopBtn" onclick="document.getElementById('main-scroll-container').scrollTo({top: 0, behavior: 'smooth'})" class="absolute bottom-[180px] md:bottom-[140px] right-4 md:right-6 bg-cyan-500 hover:bg-cyan-300 text-black w-10 h-10 md:w-12 md:h-12 rounded-full shadow-[0_0_15px_rgba(0,243,255,0.6)] z-[6000] opacity-0 pointer-events-none transition-all duration-300 transform translate-y-4 flex items-center justify-center">
    <i class="fas fa-arrow-up text-lg md:text-xl font-black"></i>
</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-analytics.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyBxwPsNRCbYLbrILVevw1zP9JZsZHRjFQw",
        authDomain: "su-computer-studio-225e1.firebaseapp.com",
        projectId: "su-computer-studio-225e1",
        storageBucket: "su-computer-studio-225e1.firebasestorage.app",
        messagingSenderId: "220949673626",
        appId: "1:220949673626:web:6c767c20f681edfcc65123",
        measurementId: "G-9YFL980C3F"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);
    const dbRef = doc(db, "su_system", "current_db");

    let categories = ['處理器', '主機板', '記憶體', '顯示卡', '硬碟', '電源', '機殼'];
    let hardwareData = [
        { cat: '處理器', name: 'Intel i7-14700K', price: 13500, stock: 10, discount: 0, date: '2024/01/01' },
        { cat: '顯示卡', name: 'RTX 4070 Ti Super', price: 28500, stock: 5, discount: 5, date: '2024/01/01' } 
    ];
    let historyLogs = []; 
    
    let selectedRows = [];
    let isAdmin = false;
    let localDataString = "";
    let unlockedCats = [];

    let idleTimer = null;
    const IDLE_TIMEOUT = 10 * 60 * 1000;
    let lastActivity = Date.now();
    let autoSaveTimeout = null; 
    let isSavingPending = false;

    function resetIdleTimer() {
        if (!isAdmin) return;
        const now = Date.now();
        if (now - lastActivity < 1000) return; 
        lastActivity = now;
        
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
            if (isAdmin) {
                isAdmin = false;
                applyAdminUI(false);
                alert("為保護資料庫安全，管理者介面閒置超過 10 分鐘，已自動登出。");
            }
        }, IDLE_TIMEOUT);
    }

    const scrollContainer = document.getElementById('main-scroll-container');
    ['click', 'mousemove', 'keypress', 'touchstart', 'touchmove'].forEach(event => {
        window.addEventListener(event, () => { if (isAdmin) resetIdleTimer(); }, { passive: true });
    });
    scrollContainer.addEventListener('scroll', () => { if (isAdmin) resetIdleTimer(); }, { passive: true });
    
    scrollContainer.addEventListener('scroll', () => {
        const btn = document.getElementById('scrollTopBtn');
        if (scrollContainer.scrollTop > 300) {
            btn.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
            btn.classList.add('opacity-100', 'translate-y-0');
        } else {
            btn.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');
            btn.classList.remove('opacity-100', 'translate-y-0');
        }
    });

    function getCatColorStyles(catName) {
        let idx = categories.indexOf(catName);
        if(idx === -1) idx = 0;
        const hue = (idx * 137.508) % 360;
        const sat = 65 + (idx % 4) * 10;   
        const litBase = (idx % 3) * 6;
        return {
            bg: `hsla(${hue}, ${sat}%, 15%, 0.85)`,
            gradient: `linear-gradient(90deg, hsla(${hue}, ${sat}%, 10%, 0.8), hsla(${hue}, ${sat}%, 20%, 0.95), hsla(${hue}, ${sat}%, 10%, 0.8))`,
            border: `hsla(${hue}, ${sat}%, ${40 + litBase}%, 0.5)`,
            text: `hsla(${hue}, ${sat}%, ${70 + litBase}%, 1)`,
            tagBg: `hsla(${hue}, ${sat}%, 20%, 0.4)`,
            rowOdd: `hsla(${hue}, ${sat - 15}%, 12%, 0.6)`,
            rowEven: `hsla(${hue}, ${sat - 15}%, 8%, 0.8)`,
        };
    }

    onSnapshot(dbRef, (docSnap) => {
        if (docSnap.exists()) {
            const data = docSnap.data();
            const remoteDataString = JSON.stringify(data);
            
            if (localDataString === remoteDataString || isSavingPending) return; 

            categories = data.categories || categories;
            hardwareData = data.hardwareData || hardwareData;
            historyLogs = data.historyLogs || historyLogs; 
            
            localDataString = remoteDataString; 
            
            selectedRows = selectedRows.filter(r => categories.includes(r.cat));

            if(selectedRows.length === 0) {
                initializeSelectedRows();
            } else {
                categories.forEach(c => {
                    if (!selectedRows.some(r => r.cat === c)) {
                        selectedRows.push({ id: Date.now()+Math.random(), cat: c, itemIdx: "", qty: 1, stockWarning: false });
                    }
                });
            }

            if (isAdmin) {
                renderAdminItemList();
                if(!document.getElementById('historyContent').classList.contains('hidden')) renderHistory();
            }
            renderTable();
        } else {
            saveToFirebase(); 
        }
    });

    window.scheduleSave = function() {
        isSavingPending = true;
        if(autoSaveTimeout) clearTimeout(autoSaveTimeout);
        autoSaveTimeout = setTimeout(() => {
            saveToFirebase();
        }, 10000);
    }

    window.saveToFirebase = async function() {
        try {
            if(historyLogs.length > 100) historyLogs = historyLogs.slice(0, 100); 
            
            localDataString = JSON.stringify({ categories, hardwareData, historyLogs });
            await setDoc(dbRef, {
                categories: categories,
                hardwareData: hardwareData,
                historyLogs: historyLogs
            });
        } catch (error) {
            console.error("Firebase 儲存失敗:", error);
            alert("資料同步失敗，請檢查網路。");
        } finally {
            isSavingPending = false;
            autoSaveTimeout = null;
        }
    }

    function initializeSelectedRows() {
        selectedRows = [];
        categories.forEach(c => selectedRows.push({ id: Date.now()+Math.random(), cat: c, itemIdx: "", qty: 1, stockWarning: false }));
    }

    window.toggleAdminState = function() {
        document.getElementById('loginId').value = '';
        document.getElementById('loginPass').value = '';

        if (isAdmin) {
            isAdmin = false;
            applyAdminUI(false);
            clearTimeout(idleTimer); 
            if (isSavingPending) {
                clearTimeout(autoSaveTimeout);
                saveToFirebase();
            }
        } else {
            document.getElementById('loginModal').style.display = 'flex';
            document.getElementById('loginId').focus();
        }
    };

    window.closeLogin = function() { 
        document.getElementById('loginId').value = '';
        document.getElementById('loginPass').value = '';
        document.getElementById('loginModal').style.display = 'none'; 
    };

    window.attemptLogin = function() {
        const id = document.getElementById('loginId').value;
        const pass = document.getElementById('loginPass').value;
        if (id === "Koralba" && pass === "suting") {
            isAdmin = true;
            applyAdminUI(true);
            closeLogin();
            lastActivity = 0; 
            resetIdleTimer();
        } else {
            alert("驗證失敗");
            document.getElementById('loginPass').value = '';
            document.getElementById('loginPass').focus();
        }
    };

    function applyAdminUI(state) {
        const panel = document.getElementById('adminPanel');
        const userDisplay = document.getElementById('userDisplay');
        const status = document.getElementById('authStatus');
        const btnText = document.getElementById('btnText');
        const bottomActions = document.getElementById('bottomActions');
        const bottomBar = document.getElementById('bottomBar');
        const headerSubmitBtn = document.getElementById('headerSubmitBtn');
        
        if (state) {
            panel.classList.remove('hidden');
            userDisplay.classList.add('hidden');
            status.innerText = "最高管理者權限";
            status.className = "text-yellow-400 font-bold";
            btnText.innerText = "登出 資料庫管理介面";
            bottomActions.style.display = 'none';
            bottomBar.classList.add('hidden', 'md:block');
            headerSubmitBtn.style.display = 'none';
            
            renderAdminItemList();
        } else {
            panel.classList.add('hidden');
            userDisplay.classList.remove('hidden');
            status.innerText = "使用者權限";
            status.className = "text-cyan-400 font-bold";
            btnText.innerText = "Su.管理者 登入";
            bottomActions.style.display = '';
            bottomBar.classList.remove('hidden', 'md:block');
            headerSubmitBtn.style.display = 'flex';
            
            renderTable();
        }
    }

    window.toggleLock = function(cat) {
        if(unlockedCats.includes(cat)) {
            unlockedCats = unlockedCats.filter(c => c !== cat); 
        } else {
            unlockedCats.push(cat); 
        }
        renderAdminItemList();
    }

    window.renderAdminItemList = function() {
        const container = document.getElementById('adminItemEditList');
        const searchInput = document.getElementById('adminSearchInput');
        const searchTerm = searchInput ? searchInput.value.toLowerCase() : "";
        
        const sortedDB = hardwareData
            .map((item, index) => ({ item, originalIdx: index }))
            .filter(obj => obj.item.name.toLowerCase().includes(searchTerm) || obj.item.cat.toLowerCase().includes(searchTerm))
            .sort((a, b) => {
                let idxA = categories.indexOf(a.item.cat);
                let idxB = categories.indexOf(b.item.cat);
                if(idxA === -1) idxA = 999;
                if(idxB === -1) idxB = 999;
                return idxA - idxB;
            });
            
        let lastCat = "";
        let rowCounter = 0; 

        container.innerHTML = sortedDB.map((obj) => {
            const { item, originalIdx } = obj;
            const isNewGroup = item.cat !== lastCat;
            lastCat = item.cat;
            rowCounter++;
            
            const catColor = getCatColorStyles(item.cat);
            const isLocked = !unlockedCats.includes(item.cat);
            
            const disabledAttr = isLocked ? 'disabled' : '';
            const inputBaseClass = isLocked ? 'opacity-50 cursor-not-allowed bg-black/80' : 'bg-black/60 md:bg-black/40 focus:border-cyan-400';
            const btnClass = isLocked ? 'opacity-30 cursor-not-allowed bg-red-950/20' : 'text-red-400 hover:text-white bg-red-950/50 md:bg-transparent hover:bg-red-600 active:scale-95 shadow-lg md:shadow-none';
            const btnClick = isLocked ? '' : `onclick="removeDBItem(${originalIdx})"`;

            return `
            ${isNewGroup ? `
            <div class="py-3 md:py-4 px-4 text-center text-base md:text-xl font-black border-y mt-6 md:mt-4 mb-2 shadow-[0_4px_15px_rgba(0,0,0,0.3)] tracking-[0.2em] sticky md:static top-0 z-20 backdrop-blur-xl rounded-xl md:rounded-lg flex justify-center items-center gap-4 group cursor-pointer" style="background: ${catColor.gradient}; border-color: ${catColor.border}; color: ${catColor.text}; text-shadow: 0 0 10px ${catColor.text}80;" onclick="toggleLock('${item.cat}')">
                <span>${item.cat} 區塊</span>
                <button class="text-xl md:text-2xl transition-all duration-300 transform group-hover:scale-125 ${isLocked ? 'text-red-400 drop-shadow-[0_0_8px_rgba(248,113,113,0.8)]' : 'text-green-400 drop-shadow-[0_0_8px_rgba(74,222,128,0.8)]'}" title="${isLocked ? '點擊解鎖以編輯' : '點擊鎖定保護'}">
                    <i class="fas ${isLocked ? 'fa-lock' : 'fa-lock-open'}"></i>
                </button>
            </div>` : ''}
            
            <div class="admin-row flex flex-col md:grid md:grid-cols-[100px_1fr_100px_80px_80px_100px_40px] gap-3 p-4 md:p-3 text-sm rounded-2xl md:rounded-none border border-white/10 md:border-transparent shadow-xl md:shadow-none mb-2 md:mb-0 relative transition-all duration-300 ${isLocked ? 'opacity-70' : ''}" style="background: ${(rowCounter % 2 !== 0) ? catColor.rowOdd : catColor.rowEven}; border-left: 4px solid ${catColor.border};">
                
                <div class="flex justify-between md:justify-center items-center pb-3 md:pb-0 border-b border-white/10 md:border-none">
                    <span class="md:hidden text-[12px] font-bold tracking-widest" style="color: ${catColor.text};"><i class="fas fa-tag mr-2"></i>商品分類</span>
                    <span class="px-3 md:px-2 py-1.5 md:py-1 rounded-md text-[13px] md:text-[10px] border shadow-[0_0_8px_rgba(0,0,0,0.5)] font-bold tracking-widest" style="background: ${catColor.tagBg}; color: ${catColor.text}; border-color: ${catColor.border};">${item.cat}</span>
                </div>
                
                <div class="w-full mt-1 md:mt-0">
                    <label class="md:hidden text-[11px] text-gray-400 ml-1 mb-1.5 block">名稱規格</label>
                    <input type="text" value="${item.name}" ${disabledAttr} onchange="editDB(${originalIdx}, 'name', this.value)" class="w-full p-3 md:p-2 rounded-xl md:rounded border-gray-600 input-border-cyan ${inputBaseClass}">
                </div>
                
                <div class="grid grid-cols-3 gap-3 md:contents mt-1 md:mt-0">
                    <div>
                        <label class="md:hidden text-[11px] text-gray-400 ml-1 mb-1.5 block text-center">定價</label>
                        <input type="number" value="${item.price}" ${disabledAttr} onchange="editDB(${originalIdx}, 'price', this.value)" class="w-full p-3 md:p-2 rounded-xl md:rounded text-center md:text-right border-gray-600 input-border-green ${inputBaseClass}" title="原價">
                    </div>
                    <div>
                        <label class="md:hidden text-[11px] text-gray-400 ml-1 mb-1.5 block text-center">折扣(%)</label>
                        <input type="number" value="${item.discount}" ${disabledAttr} onchange="editDB(${originalIdx}, 'discount', this.value)" class="w-full p-3 md:p-2 rounded-xl md:rounded text-yellow-500 text-center border-gray-600 input-border-yellow ${inputBaseClass}" min="0" max="100" title="折扣幅度(%)">
                    </div>
                    <div>
                        <label class="md:hidden text-[11px] text-gray-400 ml-1 mb-1.5 block text-center">庫存</label>
                        <input type="number" value="${item.stock}" ${disabledAttr} onchange="editDB(${originalIdx}, 'stock', this.value, this)" class="w-full p-3 md:p-2 rounded-xl md:rounded text-center border-gray-600 input-border-red ${inputBaseClass}" title="庫存量" min="0">
                    </div>
                </div>
                
                <div class="flex justify-between items-center mt-2 pt-3 md:mt-0 md:pt-0 border-t border-white/10 md:border-none md:contents">
                    <div class="flex flex-col justify-center text-left md:text-center w-1/2 md:w-auto">
                        <label class="md:hidden text-[11px] text-gray-500 mb-1 block">更新日期</label>
                        <div id="date-display-${originalIdx}" class="text-[13px] md:text-[10px] text-gray-400 mono-font">${item.date || '未紀錄'}</div>
                    </div>
                    <div class="flex justify-end md:justify-center items-center w-1/2 md:w-auto">
                        <button type="button" ${btnClick} ${disabledAttr} class="relative z-10 px-5 py-3 md:px-0 md:py-0 rounded-xl md:rounded-none flex items-center justify-center gap-2 transition-all border border-red-900/50 md:border-transparent ${btnClass}">
                            <i class="fas fa-trash-alt text-lg md:text-base"></i> <span class="md:hidden text-sm tracking-widest font-bold">刪除商品</span>
                        </button>
                    </div>
                </div>
            </div>`;
        }).join('');
    };

    window.addItem = function() {
        const cat = document.getElementById('newCat').value;
        const name = document.getElementById('newName').value.trim();
        const price = Number(document.getElementById('newPrice').value);
        const discount = Number(document.getElementById('itemDiscount').value); 
        const stock = Number(document.getElementById('newStock').value);
        const today = new Date().toLocaleDateString('zh-TW');

        if (!name) return alert("請輸入硬體名稱");
        if (stock < 0) return alert("⚠️ 錯誤：初始庫存量不能小於 0");
        
        const existingIdx = hardwareData.findIndex(h => h.cat === cat && h.name === name);
        if (existingIdx !== -1) {
            alert(`⚠️ 錯誤：資料庫中已存在同分類的商品「${name}」，請直接在列表中修改。`);
            return;
        }

        hardwareData.push({ cat, name, price, discount, stock, date: today });
        logHistory('add_item', `【新增商品】[${cat}] ${name} (初始定價: $${price}, 庫存: ${stock})`);

        renderAdminItemList();
        renderTable();
        scheduleSave();
        
        ['newName', 'newPrice', 'newStock'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('itemDiscount').value = '0';
    };

    window.editDB = function(idx, field, val, inputElement) {
        let parsedVal = field === 'name' ? val : Number(val) || 0;
        const oldStock = hardwareData[idx].stock;
        
        if (field === 'stock' && parsedVal < 0) {
            alert("⚠️ 錯誤：庫存設定不能小於 0");
            parsedVal = 0;
            if (inputElement) inputElement.value = 0;
        }

        if (hardwareData[idx][field] !== parsedVal) {
            hardwareData[idx][field] = parsedVal;
            hardwareData[idx].date = new Date().toLocaleDateString('zh-TW'); 
            
            if(field === 'stock') {
                const diff = parsedVal - oldStock;
                if(diff > 0) logHistory('restock', `【手動補貨】${hardwareData[idx].name} 原庫存 ${oldStock} 個，新增 ${diff} 個，目前庫存: ${parsedVal}`);
                else if(diff < 0) logHistory('stock_reduce', `【手動扣存】${hardwareData[idx].name} 原庫存 ${oldStock} 個，減少 ${Math.abs(diff)} 個，目前庫存: ${parsedVal}`);
            }
            
            const dateElement = document.getElementById('date-display-' + idx);
            if (dateElement) dateElement.innerText = hardwareData[idx].date;

            renderTable();
            scheduleSave();
        }
    };

    window.removeDBItem = function(idx) {
        if (confirm("確定刪除此資料？此操作無法還原。")) {
            const deletedItem = hardwareData[idx];
            logHistory('stock_reduce', `【刪除商品】移除了商品 ${deletedItem.name}`);
            
            hardwareData.splice(idx, 1);
            selectedRows.forEach(row => {
                if (String(row.itemIdx) === String(idx)) {
                    row.itemIdx = ""; 
                } else if (row.itemIdx !== "" && Number(row.itemIdx) > idx) {
                    row.itemIdx = Number(row.itemIdx) - 1; 
                }
            });
            renderAdminItemList();
            renderTable();
            scheduleSave();
        }
    };

    window.renderTable = function() {
        const table = document.getElementById('quoteTable');
        if(document.getElementById('newCat')) {
            document.getElementById('newCat').innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
        }
        if(document.getElementById('catTagContainer')) {
            document.getElementById('catTagContainer').innerHTML = categories.map((c, i) => {
                const colors = getCatColorStyles(c);
                return `
                <div class="flex items-center gap-2 border px-3 py-1 rounded" style="background: ${colors.tagBg}; border-color: ${colors.border};">
                    <span class="text-xs tech-font font-bold tracking-widest" style="color: ${colors.text}; text-shadow: 0 0 5px ${colors.text}40;">${c}</span>
                    <i class="fas fa-times-circle text-[10px] cursor-pointer hover:text-white transition-colors" style="color: ${colors.text}; opacity: 0.6;" onclick="removeCategory(${i})"></i>
                </div>`;
            }).join('');
        }

        table.innerHTML = categories.map(cat => {
            const catRows = selectedRows.filter(r => r.cat === cat);
            const hardwareOptions = hardwareData
                .filter(h => h.cat === cat)
                .sort((a, b) => a.name.localeCompare(b.name, 'zh-TW'));
            
            const catColor = getCatColorStyles(cat);

            let selectionHtml = catRows.map((row, index) => {
                const isItemEmpty = row.itemIdx === "";
                const item = !isItemEmpty ? hardwareData[row.itemIdx] : null;
                const finalPrice = item ? Math.round(item.price * (1 - (item.discount / 100))) : 0;
                const rowBgClass = index % 2 === 0 ? "bg-black/20" : "bg-cyan-900/20";

                const deleteBtnClass = isItemEmpty 
                    ? "absolute top-3 right-3 md:static text-gray-600 p-2 bg-gray-900/20 rounded-full md:bg-transparent md:rounded-none cursor-not-allowed opacity-40" 
                    : "absolute top-3 right-3 md:static text-red-900/60 hover:text-red-500 p-2 transition-colors bg-red-950/20 rounded-full md:bg-transparent md:rounded-none";
                const deleteBtnAttr = isItemEmpty ? "disabled" : `onclick="removeRow(${row.id})"`;

                return `
                <div class="flex flex-col md:flex-row items-stretch md:items-center gap-3 md:gap-4 mb-4 group/row ${rowBgClass} p-4 md:p-2 rounded-xl relative border border-white/5 md:border-none">
                    
                    <div class="w-full md:w-[41%] pr-8 md:pr-0">
                        <select onchange="updateSelection(${row.id}, this.value)" class="w-full p-3 md:p-4 rounded-xl mono-font text-[14px] md:text-[15px] tracking-wide bg-gray-900 border-gray-700 focus:border-cyan-500">
                            <option value="">-- 請選擇 ${cat} 組件 --</option>
                            ${hardwareOptions.map(h => {
                                const globalIdx = hardwareData.indexOf(h);
                                const stockInfo = h.stock <= 0 ? ' (已無庫存)' : ` (庫存:${h.stock})`;
                                return `<option value="${globalIdx}" ${String(row.itemIdx) === String(globalIdx) ? 'selected' : ''}>▸ ${h.name}${stockInfo}</option>`;
                            }).join('')}
                        </select>
                    </div>

                    <div class="w-full md:w-[18%] md:pl-4 tech-font flex justify-between md:block items-center mt-2 md:mt-0">
                        <span class="md:hidden text-xs text-cyan-500/70 font-bold uppercase tracking-wider">單價</span>
                        <div class="text-right md:text-left">
                            ${item ? (item.discount > 0 ? `<div class="text-[10px] md:text-xs line-through opacity-40">$${item.price.toLocaleString()}</div><div class="price-sale text-lg md:text-xl">$${finalPrice.toLocaleString()}</div>` : `<span class="text-cyan-400 text-lg md:text-xl">$${item.price.toLocaleString()}</span>`) : '<span class="text-gray-600">---</span>'}
                        </div>
                    </div>

                    <div class="w-full md:w-[18%] md:pl-4 flex flex-row md:flex-col justify-between md:justify-center items-center md:items-start border-t border-dashed border-white/10 md:border-none pt-3 md:pt-0">
                        <span class="md:hidden text-xs text-cyan-500/70 font-bold uppercase tracking-wider">數量</span>
                        <div class="flex flex-col items-end md:items-start">
                            <div class="flex items-center rounded-xl overflow-hidden bg-gray-900 border border-gray-700 ${row.stockWarning ? 'border-red-500 shadow-[0_0_10px_rgba(255,49,49,0.5)]' : ''}">
                                <button type="button" onclick="changeQty(${row.id}, -1)" class="w-10 h-10 md:w-12 md:h-12 flex items-center justify-center text-cyan-500 hover:bg-gray-800 transition-colors bg-black/40"><i class="fas fa-minus"></i></button>
                                <input type="number" value="${row.qty}" min="1" onchange="updateQty(${row.id}, this.value)" class="w-12 md:w-16 p-0 h-10 md:h-12 text-center font-black bg-transparent border-none focus:ring-0 ${row.stockWarning ? 'text-red-400' : 'text-white'}">
                                <button type="button" onclick="changeQty(${row.id}, 1)" class="w-10 h-10 md:w-12 md:h-12 flex items-center justify-center text-cyan-500 hover:bg-gray-800 transition-colors bg-black/40"><i class="fas fa-plus"></i></button>
                            </div>

                        <span class="md:hidden text-xs text-cyan-500/70 font-bold uppercase tracking-wider">小計金額</span>

                    <div class="tech-font font-bold text-lg md:text-xl border-l-4 pl-3 md:pl-4 shadow-[inset_10px_0_20px_-10px_rgba(0,0,0,0.5)] md:shadow-none" style="color: ${catColor.text}; border-color: ${catColor.border}; text-shadow: 0 0 10px ${catColor.text}80;">${cat}</div>
                </td>
                <td class="px-2 py-4 md:p-8 block md:table-cell" colspan="4">
                    ${selectionHtml}
                    <button onclick="addRow('${cat}')" class="text-xs font-bold tracking-widest tech-font border px-6 py-3 md:py-2 rounded-xl transition-all mt-2 w-full md:w-auto flex justify-center items-center hover:brightness-125" style="color: ${catColor.text}; border-color: ${catColor.border}; background: ${catColor.tagBg};">
                        <i class="fas fa-plus mr-2"></i>新增 ${cat} 項目
                    </button>
                 </td>
            </tr>`;
        }).join('');

        calculateGrandTotal();

    window.addRow = function(cat) {
        const hasEmptyRow = selectedRows.find(r => r.cat === cat && r.itemIdx === "");
        if (hasEmptyRow) {
            alert("⚠️ 提示：該分類已有待選項目，請先選擇商品型號。");
            return;
        }
        selectedRows.push({ id: Date.now() + Math.random(), cat: cat, itemIdx: "", qty: 1, stockWarning: false });
        renderTable();
    };

    window.updateSelection = function(rowId, newItemIdx) {
        const currentRow = selectedRows.find(r => r.id === rowId);
        currentRow.stockWarning = false;

        if (newItemIdx === "") {
            currentRow.itemIdx = "";
            renderTable();
            return;
        }

        const item = hardwareData[newItemIdx];
        if (item && item.stock <= 0) {
            alert(`⚠️ 提示：商品「${item.name}」目前已無庫存，待管理者補貨後方可選擇。`);
            currentRow.itemIdx = ""; 
            renderTable();
            return;
        }
        
        const isDuplicate = selectedRows.some(r => r.id !== rowId && r.cat === currentRow.cat && String(r.itemIdx) === String(newItemIdx));
        if (isDuplicate) {
            alert("⚠️ 重複選擇：此報價單已包含該商品，請直接調整現有數量。");
            renderTable(); 
            return;
        }

        currentRow.itemIdx = newItemIdx;
        currentRow.qty = 1;
        renderTable();
    };

    window.updateQty = function(id, val) {
        const row = selectedRows.find(r => r.id === id);
        if (!row) return;

        let inputQty = parseInt(val) || 1;
        row.stockWarning = false;
        if (row.itemIdx !== "") {
            const item = hardwareData[row.itemIdx];
            if (item && inputQty > item.stock) {
                inputQty = item.stock;
                row.stockWarning = true; 
            }
        }
        
        row.qty = Math.max(1, inputQty);
        renderTable();
    };

    window.changeQty = function(id, delta) {
        const row = selectedRows.find(r => r.id === id);
        if (row) {
            let newVal = parseInt(row.qty) + delta;
            if (newVal < 1) newVal = 1;
            updateQty(id, newVal);
        }
    };

    window.removeRow = function(id) {
        const targetRow = selectedRows.find(r => r.id === id);
        if (!targetRow) return;

        const sameCatRows = selectedRows.filter(r => r.cat === targetRow.cat);
        if (sameCatRows.length > 1) {
            selectedRows = selectedRows.filter(r => r.id !== id);
        } else {
            targetRow.itemIdx = "";
            targetRow.qty = 1;
            targetRow.stockWarning = false;
        }
        renderTable();
    };

    function calculateGrandTotal() {
        let total = 0;
        selectedRows.forEach(row => {
            if(row.itemIdx !== "") {
                const item = hardwareData[row.itemIdx];
                if (item) total += Math.round(item.price * (1 - (item.discount / 100))) * row.qty;
            }
        });
        document.getElementById('grandTotal').innerText = total.toLocaleString();
    }

    // --- 日誌與系統紀錄 ---
    function logHistory(type, description, amount = null) {
        historyLogs.unshift({
            id: Date.now(),
            type: type,
            date: new Date().toLocaleString('zh-TW', {hour12: false}),
            desc: description,
            amount: amount
        });
        
        // 嚴格控制只保留最新的 100 筆紀錄
        if (historyLogs.length > 100) {
            historyLogs.pop();
        }

        if(document.getElementById('adminPanel') && !document.getElementById('adminPanel').classList.contains('hidden')) {
            if(!document.getElementById('historyContent').classList.contains('hidden')) {
                renderHistory();
            }
        }
    }

    window.toggleHistoryUI = function() {
        const content = document.getElementById('historyContent');
        const icon = document.getElementById('historyToggleIcon');
        if(content.classList.contains('hidden')) {
            content.classList.remove('hidden');
            icon.classList.remove('fa-chevron-down');
            icon.classList.add('fa-chevron-up');
            renderHistory();
        } else {
            content.classList.add('hidden');
            icon.classList.remove('fa-chevron-up');
            icon.classList.add('fa-chevron-down');
        }
    }

    window.renderHistory = function() {
        const container = document.getElementById('historyContent');
        if(historyLogs.length === 0) {
            container.innerHTML = `<div class="text-gray-500 text-center py-8 text-sm tech-font tracking-widest"><i class="fas fa-folder-open mb-3 block text-3xl opacity-50"></i>尚無系統操作紀錄</div>`;
            return;
        }
        container.innerHTML = historyLogs.map(log => {
            let colorClass = "text-gray-400";
            let bgClass = "bg-gray-900/40 border-gray-700/50";
            let iconClass = "fa-info-circle";
            
            if(log.type === 'quote') { colorClass = "text-blue-400"; bgClass = "bg-blue-900/20 border-blue-800/50"; iconClass = "fa-file-invoice-dollar"; }
            if(log.type === 'restock' || log.type === 'add_item' || log.type === 'import_db') { colorClass = "text-green-400"; bgClass = "bg-green-900/20 border-green-800/50"; iconClass = "fa-box-open"; }
            if(log.type === 'stock_reduce') { colorClass = "text-yellow-400"; bgClass = "bg-yellow-900/20 border-yellow-800/50"; iconClass = "fa-box"; }
            if(log.type === 'system') { colorClass = "text-red-400"; bgClass = "bg-red-900/20 border-red-800/50"; iconClass = "fa-shield-alt"; }
            
            return `
            <div class="mb-3 p-4 rounded-xl border ${bgClass} transition-all hover:brightness-125">
                <div class="flex items-center justify-between mb-2 border-b border-white/5 pb-2">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-full flex items-center justify-center bg-black/40 shadow-inner ${colorClass}">
                            <i class="fas ${iconClass}"></i>
                        </div>
                        <span class="text-[11px] md:text-xs text-gray-400 mono-font">${log.date}</span>
                    </div>
                    ${log.amount ? `<div class="text-emerald-400 font-black tech-font text-sm md:text-base bg-emerald-950/40 px-3 py-1 rounded-lg border border-emerald-900/50">$${log.amount.toLocaleString()}</div>` : ''}
                </div>
                <div class="text-sm md:text-sm text-gray-200 leading-relaxed pl-1 pt-1 break-words">
                    ${log.desc}
                </div>
            </div>`;

        const pass = document.getElementById('clearHistoryPassInput').value;
        if (pass === "suting") {
            document.getElementById('clearHistoryModal').style.display = 'none';
            historyLogs = [];
            logHistory('system', '【系統操作】管理者已手動清空所有歷史紀錄。');
            renderHistory();
            await saveToFirebase();

            document.getElementById('clearHistoryPassInput').value = '';
            document.getElementById('clearHistoryPassInput').focus();
        }
    }

    // --- 送出報價驗證流程 ---
    window.submitQuotation = function() {
        const validRows = selectedRows.filter(r => r.itemIdx !== "");
        if (validRows.length === 0) {
            alert("⚠️ 請至少選擇一項商品後再送出報價單！");
            return;
        }

        let stockError = false;
        for (let row of validRows) {
            const item = hardwareData[row.itemIdx];
            if (item.stock < row.qty) {
                alert(`⚠️ 錯誤：商品「${item.name}」庫存不足 (剩餘: ${item.stock})，無法送出報價單！`);
                stockError = true;
                break;
            }
        }
        if (stockError) return;
        
        // 喚出密碼授權視窗
        document.getElementById('quoteAuthModal').style.display = 'flex';
        document.getElementById('quotePassInput').value = '';
        document.getElementById('quotePassInput').focus();
    };

    window.verifyQuotePassword = async function() {
        const pass = document.getElementById('quotePassInput').value;
        if (pass === "suting") {
            document.getElementById('quoteAuthModal').style.display = 'none';
            await executeQuotation(); // 密碼正確，執行扣除
        } else {
            alert("❌ 授權密碼錯誤，拒絕送出！");
            document.getElementById('quotePassInput').value = '';
            document.getElementById('quotePassInput').focus();
        }
    }

    // 正式執行扣除庫存與紀錄
    window.executeQuotation = async function() {
        const validRows = selectedRows.filter(r => r.itemIdx !== "");
        let totalAmount = 0;
        
        // 整理日誌文字 (包含詳細的庫存變更資訊)
        let logDetails = validRows.map(row => {
            const item = hardwareData[row.itemIdx];
            const finalPrice = Math.round(item.price * (1 - (item.discount / 100)));
            totalAmount += finalPrice * row.qty;
            
            const originalStock = item.stock;
            const newStock = item.stock - row.qty;
            return `[${item.cat}] ${item.name} x${row.qty} <span class="text-yellow-400 font-bold tracking-widest">(原庫存: ${originalStock} → 剩餘: ${newStock})</span>`;
        }).join(' <br> <span class="text-cyan-500/50 text-xs">◆</span> ');

        // 正式扣除庫存
        validRows.forEach(row => {
            const item = hardwareData[row.itemIdx];
            item.stock -= row.qty;
            item.date = new Date().toLocaleDateString('zh-TW');
        });
        
        logHistory('quote', `【送出報價單已扣除對應庫存】商品細項：<br><div class="mt-2 text-cyan-100">${logDetails}</div>`, totalAmount);

        // UI 視覺回饋 (動畫已依需求移除以節省效能，改為輕巧的系統原生提示)
        alert("✅ 報價單已成功送出，庫存已對應扣除！");
        
        initializeSelectedRows();
        renderTable();
        if(isAdmin) renderAdminItemList();
        
        await saveToFirebase();
    };

        const name = document.getElementById('newCatName').value.trim();
        if (name && !categories.includes(name)) {
            categories.push(name);
            selectedRows.push({ id: Date.now()+Math.random(), cat: name, itemIdx: "", qty: 1, stockWarning: false });

    // --- 匯出資料庫 ---
    window.exportDBToExcel = async function() {
        try {
            const workbook = new ExcelJS.Workbook();
            const ws = workbook.addWorksheet('商品資料庫');
            ws.columns = [
                { header: '系統分類', key: 'cat', width: 18 },
                { header: '商品名稱規格', key: 'name', width: 45 },
                { header: '零售定價', key: 'price', width: 15 },
                { header: '折扣幅度(%)', key: 'discount', width: 15 },
                { header: '目前庫存量', key: 'stock', width: 15 },
                { header: '最後更新日', key: 'date', width: 15 }
            ];
            
            ws.getRow(1).eachCell(cell => {
                cell.font = { bold: true, size: 12, color: { argb: 'FFFFFFFF' } };
                cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF0070C0' } };
                cell.alignment = { vertical: 'middle', horizontal: 'center' };
                cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
            });
            
            const sortedDB = [...hardwareData].sort((a, b) => categories.indexOf(a.cat) - categories.indexOf(b.cat));
            sortedDB.forEach(item => {
                const row = ws.addRow(item);
                row.eachCell((cell, colNum) => {
                    cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                    if(colNum !== 2) cell.alignment = { vertical: 'middle', horizontal: 'center' };
                });
            });
            
            const ws2 = workbook.addWorksheet('系統分類管理');
            ws2.columns = [{ header: '系統現有分類名稱', key: 'cat', width: 30 }];
            ws2.getRow(1).eachCell(cell => {
                cell.font = { bold: true, color: { argb: 'FFFFFFFF' } };
                cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF00B050' } };
                cell.alignment = { vertical: 'middle', horizontal: 'center' };
            });
            categories.forEach(c => {
                const row = ws2.addRow({cat: c});
                row.getCell(1).border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
            });

            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const dateStr = new Date().toLocaleDateString('zh-TW').replace(/\//g, '');
            a.download = `Su_Database_Backup_${dateStr}.xlsx`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            // 移除彈窗防止卡頓
        } catch (err) {
            console.error("資料庫匯出失敗", err);
        }
    };

    // --- 匯入還原資料庫 ---
    window.importDBFromExcel = function(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = new ExcelJS.Workbook();
                await workbook.xlsx.load(data);

                const ws = workbook.getWorksheet('商品資料庫');
                const ws2 = workbook.getWorksheet('系統分類管理');

                if(!ws) return; // 若檔案錯誤則靜默失敗

                let newHardware = [];
                ws.eachRow((row, rowNumber) => {
                    if (rowNumber === 1) return;
                    newHardware.push({
                        cat: row.getCell(1).text || '',
                        name: row.getCell(2).text || '',
                        price: Number(row.getCell(3).value) || 0,
                        discount: Number(row.getCell(4).value) || 0,
                        stock: Number(row.getCell(5).value) || 0,
                        date: row.getCell(6).text || new Date().toLocaleDateString('zh-TW')
                    });
                });

                let newCats = [];
                if (ws2) {
                    ws2.eachRow((row, rowNumber) => {
                        if (rowNumber === 1) return;
                        const c = row.getCell(1).text;
                        if (c) newCats.push(c);
                    });
                }

                // 無彈窗直接覆蓋寫入
                hardwareData = newHardware;
                if(newCats.length > 0) categories = newCats;
                
                logHistory('import_db', `【系統資料庫還原】成功自 Excel 匯入 ${newHardware.length} 筆商品資料。`);
                
                initializeSelectedRows();
                await saveToFirebase();
                renderAdminItemList();
                renderTable();
                
            } catch(error) {
                console.error("Excel匯入失敗", error);
            } finally {
                document.getElementById('importDBInput').value = ''; 
            }
        };
        reader.readAsArrayBuffer(file);
    };

    // --- 匯出報價與操作紀錄為 TXT 檔 ---
    window.exportHistoryToTxt = function() {
        if(historyLogs.length === 0) return;

        txtContent += "=================================================\n\n";

            if(log.amount) txtContent += `\n>> 總金額: $${log.amount.toLocaleString()}\n`;
            txtContent += "-------------------------------------------------\n";
        });
        
        const blob = new Blob([txtContent], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `Su_History_Logs_${new Date().toLocaleDateString('zh-TW').replace(/\//g, '')}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

                cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
            });

            // --- 4. 報價明細區塊 (斑馬紋設計) ---
            let totalAmount = 0;
            let isEvenRow = true;

            validRows.forEach(row => {
                const item = hardwareData[row.itemIdx];
                const finalPrice = Math.round(item.price * (1 - (item.discount / 100)));
                const subtotal = finalPrice * row.qty;
                totalAmount += subtotal;

                const dataRow = worksheet.addRow([ row.cat, item.name, finalPrice, row.qty, subtotal ]);
                dataRow.height = 22;

                // 斑馬紋交替色 (純白與極淺藍)
                const bgColor = isEvenRow ? 'FFFFFFFF' : 'FFF2F6FA';

                dataRow.eachCell((cell, colNum) => {
                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: bgColor } };
                    cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                    cell.font = { name: '微軟正黑體', size: 11, color: { argb: 'FF333333' } };

                    if (colNum === 1 || colNum === 4) {
                        cell.alignment = { vertical: 'middle', horizontal: 'center' };
                    } else if (colNum === 2) {
                        cell.alignment = { vertical: 'middle', horizontal: 'left', indent: 1 };
                    } else {
                        cell.alignment = { vertical: 'middle', horizontal: 'right', padding: { right: 2 } };
                        cell.numFmt = '#,##0';
                    }
                });
                
                // 分類名稱加粗顯示
                dataRow.getCell(1).font = { name: '微軟正黑體', size: 11, bold: true, color: { argb: 'FF1F4E78' } };
                isEvenRow = !isEvenRow;
            });

            // --- 5. 總計結算區塊 ---
            const footerRow = worksheet.addRow(['', '', '', '總計金額：', totalAmount]);
            footerRow.height = 30;
            worksheet.mergeCells(`A${footerRow.number}:C${footerRow.number}`);

            const footerLabel = footerRow.getCell(4);
            footerLabel.alignment = { vertical: 'middle', horizontal: 'right' };
            footerLabel.font = { name: '微軟正黑體', bold: true, size: 12, color: { argb: 'FF333333' } };

            const footerTotal = footerRow.getCell(5);
            footerTotal.alignment = { vertical: 'middle', horizontal: 'right' };
            footerTotal.font = { name: '微軟正黑體', bold: true, size: 14, color: { argb: 'FFC00000' } }; // 總金額用商務紅
            footerTotal.numFmt = '"NT$" #,##0';

            // 總計列的特殊邊框與底色
            for (let i = 1; i <= 5; i++) {
                footerRow.getCell(i).border = { top: {style:'medium', color:{argb:'FF1F4E78'}}, bottom: {style:'double', color:{argb:'FF1F4E78'}} };
                if(i >= 4) {
                   footerRow.getCell(i).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF0F0F0' } };
                }
            }

            // --- 6. 備註與客戶簽名區塊 ---
            worksheet.addRow([]); // 留空一行
            worksheet.addRow(['【備註與說明】']).font = { name: '微軟正黑體', bold: true, size: 11 };
            worksheet.addRow(['1. 本報價單自開立日期起算，有效期限為 14 天。']).font = { name: '微軟正黑體', size: 10, color: { argb:'FF555555'} };
            worksheet.addRow(['2. 硬體價格隨市場波動，若遇缺貨或停產將另行通知替換方案。']).font = { name: '微軟正黑體', size: 10, color: { argb:'FF555555'} };
            worksheet.addRow(['3. 確認報價無誤後，請於下方簽名或蓋章回傳，以利後續作業。']).font = { name: '微軟正黑體', size: 10, color: { argb:'FF555555'} };

            worksheet.addRow([]);
            worksheet.addRow([]);
            const signRow = worksheet.addRow(['', '', '客戶簽章：', '________________________']);
            signRow.getCell(3).alignment = { horizontal: 'right' };
            signRow.getCell(3).font = { name: '微軟正黑體', size: 12 };

            // --- 執行下載 ---
            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Su_Computer_報價單_${dateString.replace(/\//g, '')}_${quoteNo}.xlsx`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
        } catch (error) {
            console.error("報價單生成錯誤: ", error);
            alert("抱歉，輸出 Excel 發生異常。");
        } finally {
            btnTextEl.innerText = originalText;
        }
    };

    updateSystemDate();
    initializeSelectedRows();
</script>
</body>
</html>
